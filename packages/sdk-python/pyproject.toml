[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acr-sdk"
version = "0.1.0"
description = "Python SDK for Agent Capability Runtime — runtime-enforced capability permissions for AI agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Agent Capability Runtime Contributors" },
]
keywords = ["ai-agents", "authorization", "capability-token", "runtime", "governance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
    "Framework :: FastAPI",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
langchain = [
    "acr-langchain>=0.1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime"
Documentation = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime/tree/main/packages/sdk-python"
Repository = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime"
Issues = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime/issues"

[tool.hatch.build.targets.wheel]
packages = ["acr"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "e2e: gateway integration tests (ACR_RUN_E2E=1)",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true

[[tool.mypy.overrides]]
module = "acr_langchain"
ignore_missing_imports = true
