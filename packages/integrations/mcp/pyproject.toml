[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acr-mcp"
version = "0.1.0"
description = "MCP tool-call governance for Agent Capability Runtime — policy enforcement at the MCP boundary"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Agent Capability Runtime Contributors" },
]
keywords = ["ai-agents", "mcp", "authorization", "capability-token", "governance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
dependencies = [
    "acr-sdk>=0.1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime"
Documentation = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime/tree/main/packages/integrations/mcp"
Repository = "https://github.com/agent-capability-runtime/Agent_Capability_Runtime"

[tool.hatch.build.targets.wheel]
packages = ["acr_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true
