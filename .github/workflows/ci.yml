name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Run examples
        run: |
          pnpm example:token
          pnpm example:e2e
          pnpm example:approval
          pnpm demo -- --auto

  python-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install and test Python SDK
        working-directory: packages/sdk-python
        run: |
          python -m pip install -e ".[dev]"
          ruff check acr tests
          mypy acr
          pytest -v -m "not e2e"
          python examples/demo_wow.py

      - name: Install and test LangChain integration
        run: |
          python -m pip install -e packages/sdk-python
          python -m pip install -e "packages/integrations/langchain[dev]"
          cd packages/integrations/langchain
          ruff check acr_langchain tests
          pytest -v

      - name: Install and test MCP integration
        run: |
          python -m pip install -e packages/sdk-python
          python -m pip install -e "packages/integrations/mcp[dev]"
          cd packages/integrations/mcp
          ruff check acr_mcp tests
          pytest -v

  go-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test Go SDK
        working-directory: packages/sdk-go
        run: go test ./... -v

  integration:
    runs-on: ubuntu-latest
    needs: [build-and-test, python-sdk, go-sdk]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Start gateway
        env:
          ACR_SIGNING_SECRET: dev-secret-change-in-production-32b-minimum
          PORT: 3000
        run: |
          pnpm --filter @acr/gateway run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Gateway ready"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway failed to start"
          exit 1

      - name: Python SDK gateway e2e
        working-directory: packages/sdk-python
        env:
          ACR_RUN_E2E: "1"
          ACR_GATEWAY_URL: http://localhost:3000
        run: |
          python -m pip install -e ".[dev]"
          pytest -v -m e2e
          python examples/e2e_gateway.py

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go SDK gateway e2e
        working-directory: packages/sdk-go
        env:
          ACR_RUN_E2E: "1"
          ACR_GATEWAY_URL: http://localhost:3000
        run: go test ./... -v -run TestGateway
